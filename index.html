<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SENOYA'S M-WEB</title>
    <style>
        /* --- 기본 테마 --- */
        body { 
            margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
        }
        html { scroll-behavior: smooth; }

        /* --- [추가] 상단 고정 헤더 --- */
        .site-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            z-index: 2000; font-weight: 900; font-size: 1.2rem; letter-spacing: 1px;
            color: #fff; pointer-events: none; /* 클릭 방해 금지 */
        }

        /* --- 메인 갤러리 레이아웃 --- */
        #main-page { padding-top: 70px; } /* 헤더 공간 확보 */
        .gallery {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 2px; padding: 2px; max-width: 500px; margin: 0 auto;
        }
        .thumb-container { aspect-ratio: 1 / 1; overflow: hidden; background: #111; cursor: pointer; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* --- [수정] 하단 바 스타일 --- */
        .bottom-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; max-width: 500px; margin: 0 auto;
        }
        .bottom-bar button {
            background: transparent; border: none; color: white;
            font-size: 1rem; font-weight: bold; cursor: pointer; flex: 1;
        }
        .bottom-bar button:nth-child(1) { text-align: left; }  /* 이전 */
        .bottom-bar button:nth-child(2) { text-align: center; } /* HOME */
        .bottom-bar button:nth-child(3) { text-align: right; } /* 다음 */
        .bottom-bar button:disabled { opacity: 0.3; }

        /* --- 팝업 전용 스타일 --- */
        #popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1500; display: none;
        }

        /* [수정] 팝업 하단바 (고정형) */
        #popup .bottom-bar {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px; /* PC에서도 사진 폭 안으로 제한 */
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            z-index: 2100;
        }

        /* 슬라이더 (PC 마우스 드래그 지원용 가로 스크롤) */
        .popup-slider {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            height: 100%; width: 100%; z-index: 1501;
            -webkit-overflow-scrolling: touch; cursor: grab;
        }
        .popup-slider:active { cursor: grabbing; }
        .popup-slider::-webkit-scrollbar { display: none; }

        .slide-item {
            min-width: 100%; height: 100%; scroll-snap-align: start;
            scroll-snap-stop: always; display: flex; align-items: center; justify-content: center;
        }

        .slide-item img { 
            width: 100%; height: 100%; object-fit: cover; pointer-events: none;
        }

        /* PC 화면 비율 보정 */
        @media (min-aspect-ratio: 9/16) {
            .slide-item img { width: auto; aspect-ratio: 9 / 16; }
            #popup .bottom-bar { max-width: calc(100vh * 9 / 16); } /* 사진 가로폭에 맞춤 */
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div class="site-header">SENOYA'S M-WEB</div>

    <div id="main-page">
        <div class="gallery" id="gallery-grid"></div>
        <div class="bottom-bar">
            <button class="nav-prev" onclick="changePage(-1)">이전</button>
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})">HOME</button>
            <button class="nav-next" onclick="changePage(1)">다음</button>
        </div>
    </div>

    <div id="popup">
        <div class="popup-slider" id="slider"></div>
        <div class="bottom-bar">
            <button onclick="moveSlider(-1)">이전</button>
            <button onclick="closePopup()">HOME</button>
            <button onclick="moveSlider(1)">다음</button>
        </div>
    </div>

    <script>
        let allImages = []; 
        let currentPage = 1;
        const itemsPerPage = 30;

        // 1. 데이터 로드
        fetch('./data.json').then(res => res.json()).then(data => {
            allImages = data;
            renderGallery();
        });

        // 2. 메인 갤러리 생성
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = ''; 
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = allImages.slice(start, end);

            currentItems.forEach((imgSrc, index) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb-container';
                thumb.innerHTML = `<img src="data/${imgSrc}" loading="lazy" decoding="async">`;
                thumb.onclick = () => openPopup(index, currentItems);
                grid.appendChild(thumb);
            });

            // 메인 버튼 활성화/비활성화
            document.querySelectorAll('.nav-prev').forEach(b => b.disabled = (currentPage === 1));
            document.querySelectorAll('.nav-next').forEach(b => b.disabled = (end >= allImages.length));
        }

        function changePage(direction) {
            currentPage += direction;
            renderGallery();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // 3. 팝업 열기/닫기
        function openPopup(index, data) {
            const popup = document.getElementById('popup');
            const slider = document.getElementById('slider');
            slider.innerHTML = data.map(img => `<div class="slide-item"><img src="data/${img}"></div>`).join('');
            popup.style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            const targetSlide = slider.children[index];
            slider.scrollTo({ left: targetSlide.offsetLeft, behavior: 'auto' });
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function moveSlider(direction) {
            const slider = document.getElementById('slider');
            slider.scrollBy({ left: window.innerWidth * direction, behavior: 'smooth' });
        }

        // 4. PC 마우스 드래그 스크롤 기능 추가
        const slider = document.getElementById('slider');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; // 스크롤 속도 조절
            slider.scrollLeft = scrollLeft - walk;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') moveSlider(1);
            if (e.key === 'ArrowLeft') moveSlider(-1);
            if (e.key === 'Escape') closePopup();
        });
    </script>
</body>
</html>
