<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SENOYA'S M-WEB</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            overflow-x: hidden; -webkit-user-select: none; user-select: none;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        body::-webkit-scrollbar { display: none; }
        html { scroll-behavior: smooth; }

        .site-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            z-index: 2000; font-weight: 900; font-size: 1.2rem; letter-spacing: 1px;
            color: #fff; pointer-events: none;
        }

        #main-page { padding-top: 70px; }
        .gallery {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 2px; padding: 2px; max-width: 500px; margin: 0 auto;
        }
        .thumb-container { aspect-ratio: 1 / 1; overflow: hidden; background: #111; cursor: pointer; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* 공통 하단 바 스타일 */
        .bottom-bar {
            display: flex; /* 가로 정렬 */
            justify-content: space-between; 
            align-items: center;
            max-width: 500px; margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .bottom-bar button {
            background: transparent; border: none; color: white;
            font-weight: bold; cursor: pointer; flex: 1;
            display: flex; align-items: center;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        
        .nav-prev, .nav-next { font-size: 1.1rem !important; }
        .btn-home { font-size: 1rem !important; }
        
        .bottom-bar button:nth-child(1) { justify-content: flex-start; }
        .bottom-bar button:nth-child(2) { justify-content: center; }
        .bottom-bar button:nth-child(3) { justify-content: flex-end; }
        .bottom-bar button:disabled { opacity: 0.1; }

        /* 메인 페이지 하단 여백 */
        #main-page .bottom-bar { padding: 20px 30px 40px 30px; }

        /* 팝업 페이지 */
        #popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1500; display: none;
        }

        /* 팝업 하단 바: 배경 블러 원래대로 + 위치 상향 */
        #popup .bottom-bar {
            position: fixed; 
            bottom: 60px; /* 바닥에서 띄움 (원하시는 위치) */
            left: 50%; transform: translateX(-50%);
            /* 원래 스타일: 화면 전체 너비에 걸친 그라데이션 블러 */
            background: linear-gradient(to top, rgba(0,0,0,0.7) 30%, transparent);
            padding: 20px 30px 20px 30px; 
            z-index: 2100;
        }

        .popup-slider {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            height: 100%; width: 100%; z-index: 1501;
            -webkit-overflow-scrolling: touch; cursor: grab;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .popup-slider::-webkit-scrollbar { display: none; }

        .slide-item {
            min-width: 100%; height: 100%; scroll-snap-align: start;
            scroll-snap-stop: always; display: flex; align-items: center; justify-content: center;
        }
        .slide-item img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        @media (min-aspect-ratio: 9/16) {
            .slide-item img { width: auto; aspect-ratio: 9 / 16; }
            #popup .bottom-bar { max-width: calc(100vh * 9 / 16); }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div class="site-header">SENOYA'S M-WEB</div>

    <div id="main-page">
        <div class="gallery" id="gallery-grid"></div>
        <div class="bottom-bar">
            <button class="nav-prev" onclick="changePage(-1)">&#10094;</button>
            <button class="btn-home" onclick="window.scrollTo({top:0, behavior:'smooth'})">HOME</button>
            <button class="nav-next" onclick="changePage(1)">&#10095;</button>
        </div>
    </div>

    <div id="popup">
        <div class="popup-slider" id="slider"></div>
        <div class="bottom-bar">
            <button class="nav-prev" onclick="moveSlider(-1)">&#10094;</button>
            <button class="btn-home" onclick="closePopup()">HOME</button>
            <button class="nav-next" onclick="moveSlider(1)">&#10095;</button>
        </div>
    </div>

    <script>
        let allImages = []; 
        let currentPage = 1;
        const itemsPerPage = 100;

        fetch('./data.json').then(res => res.json()).then(data => {
            allImages = data;
            renderGallery();
        });

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = ''; 
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = allImages.slice(start, end);

            currentItems.forEach((imgSrc, index) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb-container';
                thumb.innerHTML = `<img src="data/${imgSrc}" loading="lazy" decoding="async">`;
                thumb.onclick = () => openPopup(index, currentItems);
                grid.appendChild(thumb);
            });

            document.querySelectorAll('#main-page .nav-prev').forEach(b => b.disabled = (currentPage === 1));
            document.querySelectorAll('#main-page .nav-next').forEach(b => b.disabled = (end >= allImages.length));
        }

        function changePage(direction) {
            currentPage += direction;
            renderGallery();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function openPopup(index, data) {
            const popup = document.getElementById('popup');
            const slider = document.getElementById('slider');
            slider.innerHTML = data.map(img => `<div class="slide-item"><img src="data/${img}"></div>`).join('');
            popup.style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            const targetSlide = slider.children[index];
            slider.scrollTo({ left: targetSlide.offsetLeft, behavior: 'auto' });
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function moveSlider(direction) {
            const slider = document.getElementById('slider');
            slider.scrollBy({ left: window.innerWidth * direction, behavior: 'smooth' });
        }

        const slider = document.getElementById('slider');

        slider.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY > 0) moveSlider(1);
            else moveSlider(-1);
        }, { passive: false });

        let isDown = false; let startX; let scrollLeft;
        slider.addEventListener('mousedown', (e) => {
            isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') moveSlider(1);
            if (e.key === 'ArrowLeft') moveSlider(-1);
            if (e.key === 'Escape') closePopup();
        });
    </script>
</body>
</html>
